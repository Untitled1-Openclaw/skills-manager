<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skills Manager</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/common.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div id="toast" aria-live="polite"></div>

    <main id="login-screen" class="auth-shell" hidden>
      <section class="auth-panel" aria-labelledby="login-title">
        <p class="eyebrow">Local Skills</p>
        <h1 id="login-title">Skills Manager</h1>
        <p class="muted">Sign in to browse, edit, upload, and download local skills.</p>
        <form id="login-form" class="stack">
          <label>
            Username
            <input id="login-username" name="username" autocomplete="username" required />
          </label>
          <label>
            Password
            <input id="login-password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary" type="submit">Sign in</button>
          <p id="login-error" class="error" role="alert"></p>
        </form>
      </section>
    </main>

    <div id="app-shell" class="app-shell" hidden>
      <aside class="sidebar">
        <a class="brand" href="#/">
          <span class="brand-mark">SM</span>
          <span>
            <strong>Skills Manager</strong>
            <small>Local Skills</small>
          </span>
        </a>
        <nav class="nav" aria-label="Primary">
          <a href="#/" data-nav="home">Skills</a>
          <a href="#/upload" data-nav="upload">Upload</a>
          <a href="#/settings" data-nav="settings">Settings</a>
        </nav>
        <button id="logout-button" class="ghost">Sign out</button>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p id="section-eyebrow" class="eyebrow">Library</p>
            <h1 id="section-title">Skills</h1>
          </div>
          <button id="mobile-menu" class="ghost" type="button" aria-label="Toggle navigation">Menu</button>
        </header>
        <div id="view" class="view" tabindex="-1"></div>
      </section>
    </div>

    <dialog id="confirm-dialog">
      <form method="dialog" class="dialog">
        <h2>Overwrite file?</h2>
        <p class="muted">This writes your editor contents back to disk immediately.</p>
        <div class="dialog-actions">
          <button value="cancel" class="ghost">Cancel</button>
          <button value="confirm" class="primary">Save</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
